# Overrides loaded automatically by docker compose.
# Keep this file free of public port mappings when running behind Nginx Proxy Manager.

services:
  # Allow scorer/poller to reach Ollama running on the host.
  scorer:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  poller:
    extra_hosts:
      - "host.docker.internal:host-gateway"
