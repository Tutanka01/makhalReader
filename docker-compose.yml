networks:
  app:
    driver: bridge

volumes:
  data:

services:
  api:
    build: ./backend/api
    restart: unless-stopped
    env_file: .env
    volumes:
      - data:/data
    networks:
      - app
    expose:
      - "8000"

  extractor:
    build: ./backend/extractor
    restart: unless-stopped
    env_file: .env
    networks:
      - app
    expose:
      - "8001"

  scorer:
    build: ./backend/scorer
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app
    expose:
      - "8002"
    depends_on:
      - api

  poller:
    build: ./backend/poller
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app
    depends_on:
      - api
      - extractor
      - scorer

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - app
    expose:
      - "80"

  web:
    image: nginx:alpine
    restart: unless-stopped
    container_name: makhal-reader-web
    volumes:
      - ./nginx/npm.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app
    expose:
      - "80"
    depends_on:
      - api
      - frontend
