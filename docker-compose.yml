networks:
  app:
    driver: bridge

volumes:
  data:

services:
  api:
    build: ./backend/api
    restart: unless-stopped
    env_file: .env
    volumes:
      - data:/data
    networks:
      - app
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  extractor:
    build: ./backend/extractor
    restart: unless-stopped
    env_file: .env
    networks:
      - app
    expose:
      - "8001"

  scorer:
    build: ./backend/scorer
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app
    expose:
      - "8002"
    depends_on:
      - api

  poller:
    build: ./backend/poller
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app
    depends_on:
      - api
      - extractor
      - scorer

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - app
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    image: nginx:alpine
    restart: unless-stopped
    container_name: makhal-reader-web
    volumes:
      - ./nginx/npm.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
